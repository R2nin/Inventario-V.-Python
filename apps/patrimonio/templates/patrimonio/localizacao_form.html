{% extends 'patrimonio/base.html' %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}

<div class="flex items-center gap-3 mb-6">
    <a href="{% url 'localizacao_lista' %}" class="p-2 text-gray-500 hover:bg-gray-100 rounded-lg">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
        </svg>
    </a>
    <h1 class="text-2xl font-bold text-gray-800">{{ titulo }}</h1>
</div>

<div class="max-w-lg">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <form method="POST" class="space-y-5">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    {{ field.label }}{% if field.field.required %} *{% endif %}
                </label>
                {{ field }}
                {% if field.errors %}
                <p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            <div class="flex justify-end gap-3 pt-4 border-t border-gray-100">
                <a href="{% url 'localizacao_lista' %}" class="px-5 py-2 bg-gray-100 text-gray-700 rounded-lg text-sm">Cancelar</a>
                <button type="submit" class="px-5 py-2 bg-blue-700 text-white rounded-lg text-sm font-medium">
                    {% if objeto %}Salvar Alterações{% else %}Criar Localização{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
