{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page { size: 5cm 3cm; margin: 0; }
    html, body {
        margin: 0; padding: 0;
        width: 5cm; height: 3cm;
        overflow: hidden; background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    @media screen {
        html, body {
            width: 100%; height: 100%;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #6b7280;
        }
        .btn-print {
            position: fixed; top: 8px; right: 8px;
            padding: 6px 16px;
            background: #1d4ed8; color: white;
            font-family: Arial, sans-serif; font-size: 13px;
            border: none; border-radius: 6px; cursor: pointer; z-index: 100;
        }
    }
    @media print {
        .btn-print { display: none !important; }
    }
</style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<!--
    Etiqueta 5cm × 3cm.
    Posicionamento absoluto em todos os elementos — sem flexbox,
    compatível com drivers de impressora térmica.

    Layout:
      QR code  : left 3mm, top 1mm, 2.7cm × 2.7cm
      Col dir  : left 3.2cm até right 1mm
        Chapa  : topo da col direita
        Local  : centro da col direita
        Logo   : rodapé da col direita
-->
<div style="
    position: relative;
    width: 5cm; height: 3cm;
    background: white;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
">

    <!-- QR Code -->
    <img src="{% url 'gerar_qrcode' item.pk %}"
         alt="QR"
         style="
             position: absolute;
             top: 1mm; left: 3mm;
             width: 2.7cm; height: 2.7cm;
         ">

    <!-- Número da chapa -->
    <span style="
        position: absolute;
        top: 3mm; left: 3.2cm; right: 1mm;
        font-family: 'ITC Eras Bold', 'Eras Bold ITC', Arial, sans-serif;
        font-size: 16pt; font-weight: bold;
        color: #000;
        text-align: center;
        line-height: 1;
        overflow: hidden;
    ">{{ item.numero_chapa }}</span>

    <!-- Localização -->
    {% if item.localizacao %}
    <span style="
        position: absolute;
        top: 1.0cm; bottom: 1.1cm; left: 3.2cm; right: 1mm;
        font-family: Arial, sans-serif;
        font-size: 5.5pt; font-weight: 600;
        color: #000;
        text-align: center;
        line-height: 1.2;
        word-break: break-word;
        overflow: hidden;
    ">{{ item.localizacao }}</span>
    {% endif %}

    <!-- Logo FEMA -->
    <img src="{% static 'img/logo_fema.png' %}"
         alt="FEMA"
         style="
             position: absolute;
             bottom: 3mm; left: 3.2cm; right: 1mm;
             width: 1.6cm;
             max-height: 0.7cm;
             object-fit: contain;
             margin: 0 auto;
             display: block;
         ">

</div>

<script>
    window.addEventListener('load', function () { window.print(); });
    window.addEventListener('afterprint', function () { window.close(); });
</script>
</body>
</html>
