{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page { size: 5cm 3cm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 5cm; height: 3cm;
        overflow: hidden; background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    @media screen {
        html, body {
            width: 100%; height: 100%;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #6b7280;
        }
        .btn-print {
            position: fixed; top: 8px; right: 8px;
            padding: 6px 16px;
            background: #1d4ed8; color: white;
            font-family: Arial, sans-serif; font-size: 13px;
            border: none; border-radius: 6px; cursor: pointer; z-index: 100;
        }
    }
    @media print {
        .btn-print { display: none !important; }
    }
</style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<!--
    Etiqueta 5cm × 3cm.
    Centralização via margin: 2mm na tabela principal.
    Com @page margin: 0, a tabela ocupa 4.6cm × 2.6cm e
    fica centralizada com 2mm uniformes em torno do conteúdo.
    Layout via <table> — compatível com Chrome e drivers de
    impressora térmica (incluindo ELGIN L42Pro).

    Estrutura:
      Coluna esquerda (2.75cm): QR Code centralizado
      Coluna direita  (1.85cm): tabela interna com 3 linhas
        Linha 1 (~1.0cm) : número da chapa
        Linha 2 (auto)   : localização
        Linha 3 (~0.8cm) : logo FEMA
-->
<table style="
    width: 4.5cm; height: 2.6cm;
    margin: 2mm 5mm 4mm 0mm;
    border-collapse: collapse;
    table-layout: fixed;
    background: white;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
">
<tr>

    <!-- Coluna QR Code -->
    <td style="
        width: 2.7cm;
        padding: 0;
        vertical-align: middle;
        text-align: center;
    ">
        <img src="{% url 'gerar_qrcode' item.pk %}"
             alt="QR"
             style="display: inline-block; width: 2.5cm; height: 2.5cm;">
    </td>

    <!-- Coluna direita: chapa / localização / logo -->
    <td style="
        width: 1.8cm;
        padding: 0;
        vertical-align: top;
    ">
        <table style="width: 100%; height: 2.6cm; border-collapse: collapse;">

            <!-- Chapa -->
            <tr style="height: 1.0cm;">
                <td style="
                    vertical-align: middle;
                    text-align: center;
                    overflow: hidden;
                    padding-top: 1mm;
                ">
                    <span style="
                        font-family: 'ITC Eras Bold', 'Eras Bold ITC', Arial, sans-serif;
                        font-size: 15pt; font-weight: bold;
                        color: #000; line-height: 1;
                        white-space: nowrap;
                    ">{{ item.numero_chapa }}</span>
                </td>
            </tr>

            <!-- Localização -->
            <tr>
                <td style="
                    vertical-align: middle;
                    text-align: center;
                    padding: 0 1mm 1mm 1mm;
                    overflow: hidden;
                ">
                    {% if item.localizacao %}
                    <span style="
                        font-family: Arial, sans-serif;
                        font-size: 5.5pt; font-weight: 600;
                        color: #000; line-height: 1.2;
                        word-break: break-word;
                    ">{{ item.localizacao }}</span>
                    {% endif %}
                </td>
            </tr>

            <!-- Logo FEMA -->
            <tr style="height: 0.8cm;">
                <td style="
                    vertical-align: middle;
                    text-align: center;
                    padding-bottom: 1mm;
                ">
                    <img src="{% static 'img/logo_fema.png' %}"
                         alt="FEMA"
                         style="
                             display: inline-block;
                             width: 1.4cm;
                             max-height: 0.6cm;
                             object-fit: contain;
                         ">
                </td>
            </tr>

        </table>
    </td>

</tr>
</table>

<script>
    window.addEventListener('load', function () { window.print(); });
    window.addEventListener('afterprint', function () { window.close(); });
</script>
</body>
</html>
