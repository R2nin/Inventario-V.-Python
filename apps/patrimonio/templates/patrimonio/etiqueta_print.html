{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page { size: 5cm 3cm; margin: 0; }
    html, body {
        margin: 0;
        padding: 0;
        width: 5cm;
        height: 3cm;
        overflow: hidden;
        background: white;
    }
    @media screen {
        html, body {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #9ca3af;
        }
        .btn-print {
            position: fixed;
            top: 8px;
            right: 8px;
            padding: 6px 14px;
            background: #1d4ed8;
            color: white;
            font-family: Arial, sans-serif;
            font-size: 13px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            z-index: 100;
        }
    }
    @media print {
        .btn-print { display: none; }
    }
</style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<!-- Etiqueta 5cm × 3cm — estilos 100% inline, idênticos à versão funcional -->
<div style="
    position: fixed;
    top: 0; left: 0;
    width: 5cm; height: 3cm;
    display: flex;
    flex-direction: row;
    align-items: center;
    overflow: hidden;
    background: white;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
">
    <!-- QR Code -->
    <img src="{% url 'gerar_qrcode' item.pk %}"
         alt="QR Code chapa {{ item.numero_chapa }}"
         style="height: 2.7cm; width: 2.7cm; display: block; flex-shrink: 0;
                margin-left: 3mm; margin-top: 0.1cm; margin-bottom: 3mm;
                align-self: flex-start;">

    <!-- Coluna direita: número + localização + logo -->
    <div style="
        flex: 1;
        display: flex; flex-direction: column;
        align-items: center; justify-content: space-between;
        padding: 0.1cm 0.1cm 3mm 0.1cm;
        overflow: hidden;
        height: 3cm;
        box-sizing: border-box;
    ">
        <!-- Número da chapa -->
        <span style="
            font-family: 'ITC Eras Bold', 'Eras Bold ITC', 'Eras Bold', Arial, sans-serif;
            font-size: 16pt;
            font-weight: bold;
            color: #000;
            line-height: 1;
            text-align: center;
        ">{{ item.numero_chapa }}</span>

        <!-- Localização -->
        {% if item.localizacao %}
        <span style="
            font-family: Arial, sans-serif;
            font-size: 6pt;
            font-weight: 600;
            color: #000;
            line-height: 1.2;
            text-align: center;
            word-break: break-word;
        ">{{ item.localizacao }}</span>
        {% endif %}

        <!-- Logo FEMA -->
        <img src="{% static 'img/logo_fema.png' %}"
             alt="FEMA"
             style="max-height: 0.7cm; max-width: 1.6cm; object-fit: contain; display: block;">
    </div>
</div>

<script>
    // Aguarda todas as imagens carregarem, depois abre o diálogo de impressão
    window.addEventListener('load', function () {
        window.print();
    });
    window.addEventListener('afterprint', function () {
        window.close();
    });
</script>

</body>
</html>
