{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page { size: 5cm 3cm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 5cm; height: 3cm;
        overflow: hidden; background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    @media screen {
        html, body {
            width: 100%; height: 100%;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #6b7280;
        }
        .btn-print {
            position: fixed; top: 8px; right: 8px;
            padding: 6px 16px;
            background: #1d4ed8; color: white;
            font-family: Arial, sans-serif; font-size: 13px;
            border: none; border-radius: 6px; cursor: pointer; z-index: 100;
        }
    }
    @media print {
        .btn-print { display: none !important; }
    }
</style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<!--
    Etiqueta 5cm × 3cm.
    Coluna esquerda (tabela): QR Code centralizado.
    Coluna direita: position:absolute para cada elemento —
    garante que texto longo não expande o layout.

    margin: 1mm 5mm 1mm 0mm compensa offset do driver ELGIN L42Pro.
    Área útil: 4.5cm × 2.8cm (1+45+5=51? não — 0+45+5=50mm ✓, 1+28+1=30mm ✓)
-->
<table style="
    width: 4.5cm; height: 2.8cm;
    margin: 1mm 5mm 1mm 0mm;
    border-collapse: collapse;
    table-layout: fixed;
    background: white;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
">
<tr>

    <!-- Coluna QR Code -->
    <td style="
        width: 2.7cm;
        padding: 0;
        vertical-align: middle;
        text-align: center;
    ">
        <img src="{% url 'gerar_qrcode' item.pk %}"
             alt="QR"
             style="display: inline-block; width: 2.5cm; height: 2.5cm;">
    </td>

    <!-- Coluna direita: position relative — filhos em absolute -->
    <td style="
        width: 1.8cm;
        padding: 0;
        position: relative;
        overflow: hidden;
    ">
        <!-- Chapa: topo fixo, altura 1.0cm -->
        <div style="
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1.0cm;
            display: table; width: 1.8cm;
        ">
            <div style="display: table-cell; vertical-align: middle; text-align: center; padding-top: 1mm;">
                <span style="
                    font-family: 'ITC Eras Bold', 'Eras Bold ITC', Arial, sans-serif;
                    font-size: 15pt; font-weight: bold;
                    color: #000; line-height: 1;
                    white-space: nowrap;
                ">{{ item.numero_chapa }}</span>
            </div>
        </div>

        <!-- Localização: meio fixo entre chapa e logo -->
        <div style="
            position: absolute;
            top: 1.0cm; left: 0; right: 0;
            bottom: 0.8cm;
            overflow: hidden;
            display: table; width: 1.8cm;
        ">
            <div style="display: table-cell; vertical-align: middle; text-align: center; padding: 0 1mm;">
                {% if item.localizacao %}
                <span style="
                    font-family: Arial, sans-serif;
                    font-size: 5.5pt; font-weight: 600;
                    color: #000; line-height: 1.2;
                    word-break: break-word;
                ">{{ item.localizacao }}</span>
                {% endif %}
            </div>
        </div>

        <!-- Logo FEMA: rodapé fixo, altura 0.8cm -->
        <div style="
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 0.8cm;
            display: table; width: 1.8cm;
        ">
            <div style="display: table-cell; vertical-align: middle; text-align: center; padding-bottom: 1mm;">
                <img src="{% static 'img/logo_fema.png' %}"
                     alt="FEMA"
                     style="
                         display: inline-block;
                         width: 1.4cm;
                         max-height: 0.6cm;
                         object-fit: contain;
                     ">
            </div>
        </div>

    </td>

</tr>
</table>

<script>
    window.addEventListener('load', function () { window.print(); });
    window.addEventListener('afterprint', function () { window.close(); });
</script>
</body>
</html>
