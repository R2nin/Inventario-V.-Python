{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page { size: 5cm 3cm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 5cm; height: 3cm;
        overflow: hidden; background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    @media screen {
        html, body {
            width: 100%; height: 100%;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #6b7280;
        }
        .btn-print {
            position: fixed; top: 8px; right: 8px;
            padding: 6px 16px;
            background: #1d4ed8; color: white;
            font-family: Arial, sans-serif; font-size: 13px;
            border: none; border-radius: 6px; cursor: pointer; z-index: 100;
        }
    }
    @media print {
        .btn-print { display: none !important; }
    }
</style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<!--
    Etiqueta 5cm × 3cm.
    Layout via <table> — compatível com Firefox, Chrome e drivers de
    impressora térmica (incluindo ELGIN L42Pro).

    Estrutura:
      Coluna esquerda (3cm): QR Code centralizado
      Coluna direita  (2cm): tabela interna com 3 linhas
        Linha 1 (~1.1cm) : número da chapa
        Linha 2 (auto)   : localização
        Linha 3 (~0.9cm) : logo FEMA
-->
<div style="
    padding: 2mm 1mm 6mm 2mm;
    box-sizing: border-box;
    width: 5cm; height: 3cm;
">
<table style="
    width: 100%; height: 100%;
    border-collapse: collapse;
    table-layout: fixed;
    background: white;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
">
<tr>

    <!-- Coluna QR Code -->
    <td style="
        width: 3cm;
        padding: 1mm 0 1mm 3mm;
        vertical-align: middle;
    ">
        <img src="{% url 'gerar_qrcode' item.pk %}"
             alt="QR"
             style="display: block; width: 2.7cm; height: 2.7cm;">
    </td>

    <!-- Coluna direita: chapa / localização / logo -->
    <td style="
        width: 2cm;
        padding: 0;
        vertical-align: top;
    ">
        <table style="width: 100%; height: 3cm; border-collapse: collapse;">

            <!-- Chapa -->
            <tr style="height: 1.1cm;">
                <td style="
                    vertical-align: top;
                    padding-top: 3mm;
                    text-align: center;
                    overflow: hidden;
                ">
                    <span style="
                        font-family: 'Arial Black', Impact, 'ITC Eras Bold', Arial, sans-serif;
                        font-size: 16pt; font-weight: 900;
                        color: #000; line-height: 1;
                        white-space: nowrap;
                    ">{{ item.numero_chapa }}</span>
                </td>
            </tr>

            <!-- Localização -->
            <tr>
                <td style="
                    vertical-align: middle;
                    text-align: center;
                    padding: 0 1mm;
                    overflow: hidden;
                ">
                    {% if item.localizacao %}
                    <span style="
                        display: inline-block;
                        font-family: 'Arial Narrow', 'Arial Condensed', Arial, sans-serif;
                        font-size: 8pt; font-weight: 600;
                        color: #000; line-height: 1.2;
                        word-break: break-word;
                        transform: scaleY(0.55);
                        transform-origin: top center;
                    ">{{ item.localizacao }}</span>
                    {% endif %}
                </td>
            </tr>

            <!-- Logo FEMA -->
            <tr style="height: 0.9cm;">
                <td style="
                    vertical-align: middle;
                    text-align: center;
                    padding-bottom: 0;
                ">
                    <img src="{% static 'img/logo_fema.png' %}"
                         alt="FEMA"
                         style="
                             display: inline-block;
                             width: 1.6cm;
                             max-height: 0.7cm;
                             object-fit: contain;
                         ">
                </td>
            </tr>

        </table>
    </td>

</tr>
</table>
</div>

<script>
    window.addEventListener('load', function () { window.print(); });
    window.addEventListener('afterprint', function () { window.close(); });
</script>
</body>
</html>
