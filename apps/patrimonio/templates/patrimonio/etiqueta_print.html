{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page { size: 5cm 3cm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 5cm; height: 3cm;
        overflow: hidden; background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    @media screen {
        html, body {
            width: 100%; height: 100%;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            background: #6b7280;
        }
        .btn-print {
            position: fixed; top: 8px; right: 8px;
            padding: 6px 16px;
            background: #1d4ed8; color: white;
            font-family: Arial, sans-serif; font-size: 13px;
            border: none; border-radius: 6px; cursor: pointer; z-index: 100;
        }
    }
    @media print {
        .btn-print { display: none !important; }
    }
</style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<!--
    Etiqueta 5cm × 3cm.
    Tabela externa (5cm×3cm) com padding 2mm uniforme = moldura simétrica.
    Tabela interna preenche o espaço restante (~4.6cm×2.6cm).
      Coluna esquerda (60%): QR Code
      Coluna direita  (40%): chapa / localização / logo
-->

<!-- Tabela-moldura: define as margens simétricas -->
<table style="
    width: 5cm; height: 3cm;
    border-collapse: collapse;
    table-layout: fixed;
    background: white;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
">
<tr>
<td style="padding: 0mm 2mm 3mm 4mm; vertical-align: middle;">

    <!-- Tabela interna: layout QR + direita -->
    <table style="width: 100%; height: 100%; border-collapse: collapse; table-layout: fixed;">
    <tr>

        <!-- Coluna QR Code (60%) -->
        <td style="width: 60%; vertical-align: middle; padding: 0;">
            <img src="{% url 'gerar_qrcode' item.pk %}"
                 alt="QR"
                 style="display: block; width: 100%; height: auto; max-height: 2.5cm;">
        </td>

        <!-- Coluna direita (40%): chapa / localização / logo -->
        <td style="width: 40%; vertical-align: top; padding: 0;">
            <table style="width: 100%; height: 100%; border-collapse: collapse;">

                <!-- Chapa -->
                <tr style="height: 35%;">
                    <td style="
                        vertical-align: middle;
                        text-align: center;
                        overflow: hidden;
                    ">
                        <span style="
                            font-family: 'Arial Black', Impact, Arial, sans-serif;
                            font-size: 15pt; font-weight: 900;
                            color: #000; line-height: 1;
                            white-space: nowrap;
                        ">{{ item.numero_chapa }}</span>
                    </td>
                </tr>

                <!-- Localização -->
                <tr>
                    <td style="
                        vertical-align: middle;
                        text-align: center;
                        padding: 0 1mm;
                        overflow: hidden;
                    ">
                        {% if item.localizacao %}
                        <span style="
                            display: inline-block;
                            font-family: 'Arial Narrow', 'Arial Condensed', Arial, sans-serif;
                            font-size: 9pt; font-weight: 600;
                            color: #000; line-height: 1.2;
                            word-break: break-word;
                            transform: scaleY(0.55);
                            transform-origin: top center;
                        ">{{ item.localizacao }}</span>
                        {% endif %}
                    </td>
                </tr>

                <!-- Logo FEMA -->
                <tr style="height: 30%;">
                    <td style="
                        vertical-align: middle;
                        text-align: center;
                    ">
                        <img src="{% static 'img/logo_fema.png' %}"
                             alt="FEMA"
                             style="
                                 display: inline-block;
                                 width: 90%;
                                 max-height: 0.7cm;
                                 object-fit: contain;
                             ">
                    </td>
                </tr>

            </table>
        </td>

    </tr>
    </table>

</td>
</tr>
</table>

<script>
    window.addEventListener('load', function () { window.print(); });
    window.addEventListener('afterprint', function () { window.close(); });
</script>
</body>
</html>
