{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Etiqueta {{ item.numero_chapa }}</title>
<style>
    @page {
        size: 5cm 3cm;
        margin: 0;
    }
    html, body {
        margin: 0;
        padding: 0;
        width: 5cm;
        height: 3cm;
        overflow: hidden;
        background: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
    }
    .etiqueta {
        display: flex;
        flex-direction: row;
        align-items: center;
        width: 5cm;
        height: 3cm;
        overflow: hidden;
        background: white;
    }
    .etiqueta img.qr {
        width: 2.7cm;
        height: 2.7cm;
        flex-shrink: 0;
        display: block;
        margin-left: 3mm;
        margin-top: 2mm;
        align-self: flex-start;
    }
    .coluna-direita {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        padding: 2mm 1mm 3mm 1mm;
        height: 3cm;
        box-sizing: border-box;
        overflow: hidden;
    }
    .chapa {
        font-family: 'ITC Eras Bold', 'Eras Bold ITC', 'Eras Bold', Arial, sans-serif;
        font-size: 16pt;
        font-weight: bold;
        color: #000000;
        line-height: 1;
        text-align: center;
    }
    .localizacao {
        font-family: Arial, sans-serif;
        font-size: 6pt;
        font-weight: 600;
        color: #000000;
        line-height: 1.2;
        text-align: center;
        word-break: break-word;
    }
    .logo-fema {
        max-height: 0.7cm;
        max-width: 1.6cm;
        object-fit: contain;
        display: block;
    }
    @media screen {
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #e5e7eb;
        }
        .etiqueta {
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
    }
</style>
</head>
<body>

<div class="etiqueta">
    <img class="qr"
         src="{% url 'gerar_qrcode' item.pk %}"
         alt="QR Code chapa {{ item.numero_chapa }}">
    <div class="coluna-direita">
        <span class="chapa">{{ item.numero_chapa }}</span>
        {% if item.localizacao %}
        <span class="localizacao">{{ item.localizacao }}</span>
        {% endif %}
        <img class="logo-fema"
             src="{% static 'img/logo_fema.png' %}"
             alt="FEMA">
    </div>
</div>

<script>
    // Auto-imprime ao carregar; fecha a janela após o diálogo
    window.addEventListener('load', function () {
        window.print();
    });
    window.addEventListener('afterprint', function () {
        window.close();
    });
</script>

</body>
</html>
